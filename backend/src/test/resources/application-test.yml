spring:
  datasource:
    url: jdbc:h2:mem:icecrack_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mqtt:
    enabled: false

drainage:
  gravity: 9.81
  friction-coeff: 0.03
  time-step: 0.5
  sample-interval: 5
  recession-threshold-m: 0.001
  recession-alert-threshold-sec: 1800
  crack-infiltration-width-factor: 10.0
  crack-infiltration-step-factor: 0.1
  crack-flux-base-multiplier: 0.8
  crack-depth-enhance-divisor: 5.0
  slope-vertical-reduction: 0.5
  cfl-factor: 0.5

aesthetic:
  box-count-min-scale: 2
  box-count-max-scale: 128
  entropy-bins: 18
  symmetry-dist-weight: 0.5
  symmetry-horiz-weight: 0.25
  symmetry-vert-weight: 0.25
  symmetry-chi-divisor: 10.0
  fractal-weight: 0.4
  entropy-weight: 0.3
  density-weight: 0.3
  density-scale: 5.0
  brown-correction-power: 0.5
